<!DOCTYPE html>
<html dir="rtl" lang="en">
<head>
    <title>مغلق للصيانة</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }
    </style>
</head>
<body>
    <h1>تم إغلاق الموقع لمدة 48 ساعة لأجل الصيانة</h1>
    <p id="timer"></p>

    <script>
        // دليل على إننا بنستخدم localStorage
        var countDownDate = localStorage.getItem('countDownDate');

        if (!countDownDate) {
            // لو مافيش تاريخ مخزن، نحفظ تاريخ انتهاء الإغلاق (48 ساعة من الآن)
            countDownDate = new Date(new Date().getTime() + 48 * 60 * 60 * 1000);
            localStorage.setItem('countDownDate', countDownDate);
        } else {
            countDownDate = new Date(countDownDate);
        }

        var now = new Date().getTime();
        var distance = countDownDate - now;

        if (distance > 0) {
            // لو المدة ما خلصتش، اظهر المؤقت
            var x = setInterval(function() {
                now = new Date().getTime();
                distance = countDownDate - now;

                var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                var seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById("timer").innerHTML = hours + " ساعة " + minutes + " دقيقة " + seconds + " ثانية ";

                if (distance < 0) {
                    clearInterval(x);
                    localStorage.removeItem('countDownDate');
                    window.location.reload();
                }
            }, 1000);
        } else {
            // لو المدة خلصت، احذف التاريخ المخزن وأظهر المحتوى الرئيسي
            localStorage.removeItem('countDownDate');
            document.body.innerHTML = '<h1>مرحباً بك في موقعنا!</h1>'; // غير المحتوى ده للمحتوى الرئيسي
        }
    </script>
</body>
</html>
